# Downloads STPSF dataset and caches it to GitHub cache,
# making a new cache for a new data version
# the cache key is in the form
# `stpsf-data-full-1.3.0`, `stpsf-data-prerel-1.3.1` etc.
#
# To provide your own test workflow with the STPSF dataset,
# you should use this workflow to set up a cache in your repository,
# and then use `retrieve_cache.yml` to retrieve that cache so you
# don't have to download the entire dataset every time.
#
# to set up a cache of STPSF data in your own repository,
# create a workflow like the following:
#
# # .github/workflows/download_stpsf.yml
# name: download and cache STPSF data
# on:
#   schedule:
#     - cron: "0 0 * * 0"
# jobs:
#   download_stpsf:
#     uses: spacetelescope/stpsf/.github/workflows/download_data.yml@beda656c80a0254e6f80649d9c9c49235634522f  # v1.4.0
#     with:
#       minimal: true

name: download and cache STPSF data

on:
  workflow_call:
    inputs:
      dataset_type:
        description: "Choose dataset type ('development' or 'latest_release')"
        type: string
        required: false
        default: development
    outputs:
      version:
        value: ${{ jobs.download.outputs.version }}
      cache_path:
        value: ${{ jobs.download.outputs.cache_path }}
      cache_key:
        value: ${{ jobs.download.outputs.cache_key }}

  workflow_dispatch:
    inputs:
      dataset_type:
        description: "Which dataset type ('development' or 'latest_release')"
        type: string
        required: false
        default: development


  schedule:
    - cron: "0 0 * * 0"   # weekly
  release:
  push:
    branches:
      - develop

env:
  PRERELEASE_URL: https://stsci.box.com/shared/static/50i1h17hij7r3pki8zmaxsh8o7pyqj79.gz
  LATEST_RELEASE_URL: https://stsci.box.com/shared/static/kqfolg2bfzqc4mjkgmujo06d3iaymahv.gz

jobs:
  download:
    name: download and cache STPSF ${{ inputs.dataset_type }} data
    runs-on: ubuntu-latest
    steps:
      - name: Select dataset URL
        id: dataset_url
        env:
          DATASET_TYPE: ${{ inputs.dataset_type }}
          PRERELEASE_URL: ${{ env.PRERELEASE_URL }}
          LATEST_RELEASE_URL: ${{ env.LATEST_RELEASE_URL }}
        run: |
          if [ "$DATASET_TYPE" = "development" ]; then
            echo "url=$PRERELEASE_URL" >> $GITHUB_OUTPUT
          elif [ "$DATASET_TYPE" = "latest_release" ]; then
            echo "url=$LATEST_RELEASE_URL" >> $GITHUB_OUTPUT
          else
            echo "Unsupported dataset_type: $DATASET_TYPE" >&2
            exit 1
          fi

      - name: Download dataset
        run: wget ${{ steps.dataset_url.outputs.url }} -O ${{ runner.temp }}/stpsf-data.tar.gz

      - name: Extract dataset
        run: |
          mkdir -p ${{ runner.temp }}/data/
          tar -xzvf ${{ runner.temp }}/stpsf-data.tar.gz -C ${{ runner.temp }}/data/

      - id: cache_path
        env:
          DATA_PATH: ${{ runner.temp }}/data/
        run: echo "cache_path=$DATA_PATH" >> $GITHUB_OUTPUT

      - id: version
        env:
          DATA_PATH: ${{ steps.cache_path.outputs.cache_path }}
        run: echo "version=$(cat $DATA_PATH/stpsf-data/version.txt)" >> $GITHUB_OUTPUT

      - id: cache_key
        env:
          DATASET_TYPE: ${{ inputs.dataset_type }}
          VERSION: ${{ steps.version.outputs.version }}
        run: echo "cache_key=stpsf-data-$DATASET_TYPE-$VERSION" >> $GITHUB_OUTPUT

      - name: Save cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/data/
          key: ${{ steps.cache_key.outputs.cache_key }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      cache_path: ${{ steps.cache_path.outputs.cache_path }}
      cache_key: ${{ steps.cache_key.outputs.cache_key }}
